version: 2
updates:
  # Keep the SHA-pinned third-party actions current so the pins don't rot (stale +
  # unpatched). Dependabot bumps the commit SHAs in .github/workflows/ and updates the
  # `# vX.Y.Z` comments; grouped into one PR to keep the noise down.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns: ["*"]
