name: Second Opinion

# Dogfood: review our own PRs with this very reviewer. Pinned to @main while we hold the
# v1 tag (GitHub rebuilds the Docker action from main each run); switch to @v1 once tagged.
# Needs an OPENROUTER_API_KEY repo secret.
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:                       # one run per PR; a new push cancels the old
  group: second-opinion-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Same-repo PRs only, so the key is never exposed to a fork.
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: storkme/second-opinion@main
        with:
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          guidance-file: .github/review-guidance.md
