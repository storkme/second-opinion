name: Second Opinion

# Dogfood: review our own PRs with this very reviewer, pinned to the released @v1.
# (To test unreleased reviewer changes, temporarily point this at @main or a branch.)
# Needs an OPENROUTER_API_KEY repo secret.
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:                       # one run per PR; a new push cancels the old
  group: second-opinion-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Same-repo PRs only, so the key is never exposed to a fork.
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: storkme/second-opinion@v1
        with:
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          guidance-file: .github/review-guidance.md
